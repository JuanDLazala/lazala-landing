<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAZALA — Artículo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #FFFFFF;
      --dark: #252053;
      --support: #A7B4C9;
      --accent: #36388F;
      --cta: #D92830;
      --font-sans: 'Nunito Sans', -apple-system, sans-serif;
      --font-serif: 'Playfair Display', Georgia, serif;
      --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-sans);
      color: var(--dark);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--accent); color: var(--white); }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 100;
      padding: 1.2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
      border-bottom: 1px solid rgba(37, 32, 83, 0.04);
    }

    .nav-logo-img { height: 30px; width: auto; display: block; }

    .nav-back {
      color: var(--dark);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color var(--transition);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-back:hover { color: var(--accent); }

    /* ARTICLE */
    .article-header {
      padding: 10rem 0 4rem;
      text-align: center;
      max-width: 720px;
      margin: 0 auto;
    }

    .article-category {
      display: inline-block;
      padding: 0.25rem 1rem;
      background: rgba(54, 56, 143, 0.06);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .article-title {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--dark);
      margin-bottom: 1.5rem;
    }

    .article-meta {
      font-size: 0.8rem;
      color: var(--support);
      font-weight: 400;
    }

    .article-meta span { margin: 0 0.5rem; }

    .article-divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 3rem auto;
    }

    .article-body {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .article-body p {
      font-family: var(--font-sans);
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.9;
      color: #444;
      margin-bottom: 1.8rem;
    }

    .article-body p:first-child::first-letter {
      font-family: var(--font-serif);
      font-size: 3.5rem;
      float: left;
      line-height: 1;
      margin-right: 0.6rem;
      margin-top: 0.1rem;
      color: var(--dark);
      font-weight: 700;
    }

    /* FOOTER NAV */
    .article-footer {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 2rem 6rem;
      border-top: 1px solid rgba(37, 32, 83, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .article-footer a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      transition: color var(--transition);
    }

    .article-footer a:hover { color: var(--cta); }

    /* RELATED */
    .related {
      background: rgba(37, 32, 83, 0.02);
      padding: 5rem 0;
    }

    .related-container {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .related-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }

    .related-card {
      padding: 2rem;
      background: var(--white);
      border: 1px solid rgba(37, 32, 83, 0.04);
      transition: all var(--transition);
      text-decoration: none;
      display: block;
    }

    .related-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .related-card-cat {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--support);
      margin-bottom: 0.6rem;
    }

    .related-card-title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--dark);
      line-height: 1.35;
    }

    /* SITE FOOTER */
    footer {
      padding: 3rem 0;
      background: var(--dark);
    }

    .footer-content {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo-img { height: 24px; width: auto; display: block; }

    .footer-text {
      font-size: 0.75rem;
      color: rgba(167, 180, 201, 0.5);
      font-weight: 400;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 12rem 2rem;
      color: var(--support);
      font-size: 0.85rem;
    }

    @media (max-width: 900px) {
      nav { padding: 1rem 1.5rem; }
      .article-header { padding: 8rem 2rem 3rem; }
      .related-grid { grid-template-columns: 1fr; }
      .article-footer { flex-direction: column; align-items: flex-start; }
      .footer-content { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html"><img src="assets/logo.png" alt="LAZALA" class="nav-logo-img"></a>
    <a href="index.html#blog" class="nav-back">← Volver a ideas</a>
  </nav>

  <main id="articleMain">
    <p class="loading">Cargando artículo...</p>
  </main>

  <div id="relatedSection"></div>

  <footer>
    <div class="footer-content">
      <img src="assets/logo_V2.png" alt="LAZALA" class="footer-logo-img">
      <p class="footer-text">© 2026 LAZALA. Arquitectura de Influencia.</p>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    const main = document.getElementById('articleMain');
    const relatedSection = document.getElementById('relatedSection');

    fetch('posts/posts.json')
      .then(r => r.json())
      .then(posts => {
        const post = posts.find(p => p.slug === slug);
        if (!post) {
          main.innerHTML = '<p class="loading">Artículo no encontrado.</p>';
          return;
        }

        document.title = `${post.title} — LAZALA`;

        const dateFormatted = new Date(post.date + 'T00:00:00').toLocaleDateString('es-ES', {
          year: 'numeric', month: 'long', day: 'numeric'
        });

        main.innerHTML = `
          <header class="article-header">
            <span class="article-category">${post.category}</span>
            <h1 class="article-title">${post.title}</h1>
            <p class="article-meta">Juan Lazala <span>·</span> ${dateFormatted}</p>
          </header>
          <div class="article-divider"></div>
          <article class="article-body">
            ${post.content.map(p => `<p>${p}</p>`).join('')}
          </article>
          <div class="article-footer">
            <a href="index.html#blog">← Todas las ideas</a>
            <a href="#contacto-link" onclick="window.location.href='index.html#contacto'">Trabajar conmigo →</a>
          </div>
        `;

        // Related posts
        const related = posts.filter(p => p.slug !== slug).slice(0, 3);
        if (related.length) {
          relatedSection.innerHTML = `
            <section class="related">
              <div class="related-container">
                <p class="related-label">Más ideas</p>
                <div class="related-grid">
                  ${related.map(r => `
                    <a href="post.html?slug=${r.slug}" class="related-card">
                      <p class="related-card-cat">${r.category}</p>
                      <h3 class="related-card-title">${r.title}</h3>
                    </a>
                  `).join('')}
                </div>
              </div>
            </section>
          `;
        }
      })
      .catch(() => {
        main.innerHTML = '<p class="loading">Error al cargar el artículo.</p>';
      });
  </script>
</body>
</html>
